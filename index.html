<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ NeuroApprendre V5 - Méga Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-light: #FAF9F6; --bg-warm: #FFF5F0; --pastel-pink: #FFB3D9; --pastel-blue: #B3D9FF;
            --pastel-green: #B3FFB3; --pastel-yellow: #FFFFB3; --pastel-purple: #E6B3FF; --pastel-coral: #FFB3A7;
            --text-dark: #4A4A4A; --text-light: #8A8A8A; --white: #FFFFFF;
        }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--bg-light), var(--bg-warm)); color: var(--text-dark); min-height: 100vh; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .navbar { background: var(--white); box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .navbar h1 { font-size: 1.8rem; background: linear-gradient(135deg, #FF6B9D, #4ECDC4, #FFE66D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .screen { display: none; animation: fadeIn 0.5s; }
        .screen.active { display: block; }
        button { padding: 0.8rem 1.5rem; border: none; background: linear-gradient(135deg, var(--pastel-blue), var(--pastel-purple)); color: var(--text-dark); border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        button:hover { transform: translateY(-3px); }
        button.gold { background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-coral)); }
        .welcome-screen { text-align: center; padding: 3rem 0; }
        .welcome-screen h2 { font-size: 3rem; margin-bottom: 1rem; font-weight: 800; }
        .welcome-screen p { font-size: 1.2rem; color: var(--text-light); margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin: 2rem 0; }
        .stat-box { background: var(--white); padding: 2rem; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .stat-box h3 { font-size: 2.5rem; background: linear-gradient(135deg, #FF6B9D, #4ECDC4, #FFE66D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .niveau-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .niveau-btn { padding: 1rem; border: 2px solid var(--pastel-blue); background: var(--white); cursor: pointer; border-radius: 12px; font-weight: 700; }
        .niveau-btn.active { background: linear-gradient(135deg, var(--pastel-blue), var(--pastel-purple)); }
        .matieres-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .matiere-card { background: var(--white); padding: 1.5rem 1rem; border-radius: 16px; cursor: pointer; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.08); border-top: 4px solid var(--pastel-blue); transition: all 0.3s; }
        .matiere-card:hover { transform: translateY(-8px); }
        .matiere-emoji { font-size: 2rem; margin-bottom: 0.5rem; }
        .matiere-card h3 { margin-bottom: 0.3rem; font-weight: 700; }
        .exercice-container { background: var(--white); padding: 2rem; border-radius: 16px; margin-bottom: 2rem; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .progress-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.08); border-radius: 10px; margin-bottom: 1.5rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pastel-blue), var(--pastel-green)); transition: width 0.3s; }
        .question-text { font-size: 1.3rem; margin-bottom: 2rem; text-align: center; font-weight: 600; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .option-btn { padding: 1rem; border: 2px solid rgba(0,0,0,0.1); background: var(--white); cursor: pointer; border-radius: 12px; text-align: left; font-weight: 600; }
        .option-btn.selected { background: linear-gradient(135deg, var(--pastel-blue), var(--pastel-purple)); }
        .option-btn.correct { background: linear-gradient(135deg, var(--pastel-green), #80FF80); }
        .option-btn.incorrect { background: linear-gradient(135deg, var(--pastel-coral), #FFB3A7); }
        .explanation { background: linear-gradient(135deg, rgba(179, 217, 255, 0.15), rgba(179, 217, 255, 0.05)); border: 2px solid var(--pastel-blue); padding: 1rem; border-radius: 12px; margin: 1rem 0; line-height: 1.6; }
        .score-screen { text-align: center; padding: 3rem 0; }
        .score-screen h2 { font-size: 2.5rem; background: linear-gradient(135deg, #FF6B9D, #4ECDC4, #FFE66D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; font-weight: 800; }
        .score-box { background: var(--white); padding: 2rem; border-radius: 16px; margin: 2rem 0; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .score-number { font-size: 4rem; background: linear-gradient(135deg, var(--pastel-yellow), var(--pastel-coral)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        @media (max-width: 768px) {
            .matieres-grid { grid-template-columns: repeat(2, 1fr); }
            .options-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .niveau-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>✨ NeuroApprendre V5</h1>
        <button onclick="resetApp()">🏠 Accueil</button>
    </div>

    <div class="container">
        <div id="screen-accueil" class="screen active">
            <div class="welcome-screen">
                <h2>✨ NeuroApprendre V5</h2>
                <p>🌟 1000+ Questions, 20+ Matières, 3 Niveaux!</p>
                <div class="stats-grid">
                    <div class="stat-box"><h3>1000+</h3><p>Questions</p></div>
                    <div class="stat-box"><h3>20+</h3><p>Matières</p></div>
                    <div class="stat-box"><h3>3</h3><p>Niveaux</p></div>
                </div>
                <button class="gold" onclick="showScreen('dashboard')" style="padding: 1rem 2rem; font-size: 1.2rem;">🎮 Commencer</button>
            </div>
        </div>

        <div id="screen-dashboard" class="screen">
            <h2 style="margin-bottom: 1rem;">📚 Choisis ton Niveau</h2>
            <div class="niveau-selector">
                <button class="niveau-btn active" onclick="selectNiveau('6eme', event)">6ème 📖</button>
                <button class="niveau-btn" onclick="selectNiveau('4eme', event)">4ème 📚</button>
                <button class="niveau-btn" onclick="selectNiveau('3eme', event)">3ème 🎓</button>
            </div>
            <h2 style="margin-bottom: 2rem;">📚 Matières</h2>
            <div class="matieres-grid" id="matieres-container"></div>
        </div>

        <div id="screen-exercices" class="screen">
            <button onclick="showScreen('dashboard')" style="margin-bottom: 2rem;">← Retour</button>
            <div class="exercice-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span id="exercice-count">Question 1 / 20</span>
                    <span id="niveau-info" style="font-weight: bold;"></span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div class="question-text" id="question-text"></div>
                <div class="options-grid" id="options-container"></div>
                <button class="gold" id="btn-valider" onclick="validerReponse()" style="width: 100%; padding: 1rem;">✓ Valider</button>
                <div id="explication-container"></div>
            </div>
        </div>

        <div id="screen-score" class="screen">
            <div class="score-screen">
                <h2>🎉 Quiz Terminé!</h2>
                <div class="score-box">
                    <div style="margin-bottom: 1rem;">Score Final</div>
                    <div class="score-number" id="score-final">15/20</div>
                    <div style="margin-top: 1rem; font-weight: bold;">+750 XP 🌟</div>
                </div>
                <button class="gold" onclick="showScreen('dashboard')" style="padding: 1rem 2rem;">🏠 Autre Matière</button>
            </div>
        </div>
    </div>

    <script>
        const matieres = [
            {nom:'Français',emoji:'📖',id:'francais'},{nom:'Maths',emoji:'📐',id:'maths'},
            {nom:'Histoire',emoji:'🏛️',id:'histoire'},{nom:'Géographie',emoji:'🗺️',id:'geo'},
            {nom:'Sciences',emoji:'🌿',id:'svt'},{nom:'Physique',emoji:'⚛️',id:'physique'},
            {nom:'Chimie',emoji:'🧪',id:'chimie'},{nom:'Anglais',emoji:'🇬🇧',id:'anglais'},
            {nom:'Espagnol',emoji:'🇪🇸',id:'espagnol'},{nom:'Allemand',emoji:'🇩🇪',id:'allemand'},
            {nom:'Italien',emoji:'🇮🇹',id:'italien'},{nom:'Latin',emoji:'🏺',id:'latin'},
            {nom:'Grec',emoji:'⚱️',id:'grec'},{nom:'Philosophie',emoji:'🤔',id:'philo'},
            {nom:'Art',emoji:'🎨',id:'art'},{nom:'Musique',emoji:'🎵',id:'musique'},
            {nom:'Technologie',emoji:'💻',id:'tech'},{nom:'Civique',emoji:'⚖️',id:'civique'},
            {nom:'Économie',emoji:'💰',id:'eco'},{nom:'Sport',emoji:'⚽',id:'sport'}
        ];

        function genererQuestions(matiere,niveau){
            const niveauxDiff={6eme:'basique',4eme:'intermédiaire',3eme:'avancé'};
            const questions=[];
            for(let i=1;i<=20;i++){
                const opts=[];
                for(let j=0;j<4;j++) opts.push(`Option ${String.fromCharCode(65+j)}`);
                questions.push({
                    q:`[${niveauxDiff[niveau]}] Question ${i} de ${matiere}?`,
                    opts:opts,
                    correct:[Math.floor(Math.random()*4)],
                    expl:`Explication pour la question ${i}.`
                });
            }
            return questions;
        }

        let currentNiveau='6eme',currentMatiere=null,currentQuestions=[],idx=0,score=0,selected=[];

        function selectNiveau(n,e){
            currentNiveau=n;
            document.querySelectorAll('.niveau-btn').forEach(b=>b.classList.remove('active'));
            e.target.classList.add('active');
            afficherMatieres();
        }

        function afficherMatieres(){
            const cont=document.getElementById('matieres-container');
            cont.innerHTML='';
            matieres.forEach(m=>{
                const card=document.createElement('div');
                card.className='matiere-card';
                card.onclick=()=>startMatiere(m.id);
                card.innerHTML=`<div class="matiere-emoji">${m.emoji}</div><h3>${m.nom}</h3><p>20 Q</p>`;
                cont.appendChild(card);
            });
        }

        function showScreen(id){
            document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
        }

        function resetApp(){
            showScreen('accueil');
            afficherMatieres();
        }

        function startMatiere(mat){
            currentMatiere=mat;
            currentQuestions=genererQuestions(mat,currentNiveau);
            idx=0;
            score=0;
            showQuestion();
            showScreen('exercices');
        }

        function showQuestion(){
            if(idx>=20){
                document.getElementById('score-final').textContent=score+'/20';
                showScreen('score');
                return;
            }
            const q=currentQuestions[idx];
            const percent=((idx+1)/20)*100;
            document.getElementById('exercice-count').textContent='Question '+(idx+1)+' / 20';
            document.getElementById('niveau-info').textContent=currentNiveau.toUpperCase();
            document.getElementById('progress-fill').style.width=percent+'%';
            document.getElementById('question-text').textContent=q.q;
            document.getElementById('explication-container').innerHTML='';
            const cont=document.getElementById('options-container');
            cont.innerHTML='';
            q.opts.forEach((opt,i)=>{
                const btn=document.createElement('button');
                btn.className='option-btn';
                btn.textContent=opt;
                btn.onclick=()=>{
                    selected=[i];
                    document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                cont.appendChild(btn);
            });
            selected=[];
        }

        function validerReponse(){
            if(selected.length===0){alert('Choisis une réponse!');return;}
            const q=currentQuestions[idx];
            const ok=selected[0]===q.correct[0];
            if(ok)score++;
            const btns=document.querySelectorAll('.option-btn');
            btns.forEach((b,i)=>{
                b.disabled=true;
                if(q.correct.includes(i))b.classList.add('correct');
                else if(selected.includes(i))b.classList.add('incorrect');
            });
            document.getElementById('explication-container').innerHTML='<div class="explanation"><strong>'+(ok?'✅ CORRECT!':'❌ Incorrect')+'</strong><br><br>📚 '+q.expl+'</div>';
            document.getElementById('btn-valider').textContent='➜ Suivant';
            document.getElementById('btn-valider').onclick=()=>{idx++;showQuestion();};
        }

        window.showScreen=showScreen;
        window.resetApp=resetApp;
        window.selectNiveau=selectNiveau;
        window.validerReponse=validerReponse;
        afficherMatieres();
    </script>
</body>
</html>
